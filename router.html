<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Get my plan — (Ad)mission Possible</title>
  <meta name="description" content="Answer a few questions. We map your situation and your path." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body data-page="router">

  <main>
    <div class="ov-progress" data-progress></div>
    <div class="ov-router" data-router></div>
  </main>

  <script src="./data.js"></script>
  <script src="./chrome.js" defer></script>
  <script>
    (function () {
      var D = window.AP_DATA;
      var Q = D.QUESTIONS, esc = D.esc;
      var state = { step: 0, answers: {} };
      var progressEl = document.querySelector('[data-progress]');
      var routerEl = document.querySelector('[data-router]');

      function canAdvance() {
        var q = Q[state.step], sel = state.answers[q.key];
        return q.multi ? (Array.isArray(sel) && sel.length > 0) : !!sel;
      }

      function select(q, opt) {
        var a = state.answers;
        if (q.multi) {
          var cur = Array.isArray(a[q.key]) ? a[q.key].slice() : [];
          var i = cur.indexOf(opt);
          if (i >= 0) cur.splice(i, 1); else cur.push(opt);
          a[q.key] = cur;
        } else { a[q.key] = opt; }
        render();
      }

      function next() {
        if (!canAdvance()) return;
        if (state.step < Q.length - 1) { state.step++; render(); window.scrollTo({ top: 0 }); }
        else {
          var plan = D.computePlan(state.answers);
          D.saveIntake({ answers: state.answers, plan: plan });
          window.location.href = 'plan.html';
        }
      }

      function back() {
        if (state.step > 0) { state.step--; render(); window.scrollTo({ top: 0 }); }
        else window.location.href = 'index.html';
      }

      function render() {
        var step = state.step, total = Q.length, q = Q[step], sel = state.answers[q.key];
        var isLast = step === total - 1, canNext = canAdvance();

        progressEl.innerHTML = Q.map(function (_, i) {
          return '<div class="ov-seg" style="background:' + (i <= step ? 'var(--accent)' : 'var(--hairline)') + '"></div>';
        }).join('');

        var rows = q.options.map(function (opt) {
          var on = q.multi ? (Array.isArray(sel) && sel.indexOf(opt) >= 0) : sel === opt;
          return '<div class="ov-ans" data-pick="' + esc(opt) + '">' +
            '<div class="ov-ans__mark' + (on ? ' is-on' : '') + '"></div>' +
            '<div class="ov-ans__label' + (on ? ' is-on' : '') + '">' + esc(opt) + '</div>' +
          '</div>';
        }).join('');

        var nextBtn = isLast
          ? '<button class="circle circle--router" data-next style="opacity:' + (canNext ? 1 : 0.35) + '">See my plan</button>'
          : '<button class="ov-next" data-next style="opacity:' + (canNext ? 1 : 0.35) + '">Next<span class="slash slash--inline"></span></button>';

        routerEl.innerHTML =
          '<div class="ov-router__meta">' + (step + 1) + ' / ' + total + (q.multi ? '<span class="ov-router__hint">Select all that apply</span>' : '') + '</div>' +
          '<h2 class="ov-router__q">' + esc(q.q) + '</h2>' +
          '<div class="ov-ans__list">' + rows + '</div>' +
          '<div class="ov-router__foot">' +
            '<button class="ov-back" data-back>' + (step === 0 ? 'Cancel' : 'Back') + '</button>' + nextBtn +
          '</div>';

        routerEl.querySelectorAll('[data-pick]').forEach(function (n) {
          n.addEventListener('click', function () { select(q, n.getAttribute('data-pick')); });
        });
        routerEl.querySelector('[data-next]').addEventListener('click', next);
        routerEl.querySelector('[data-back]').addEventListener('click', back);
      }

      render();
    })();
  </script>
</body>
</html>
