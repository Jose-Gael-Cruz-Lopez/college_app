<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Join — (Ad)mission Possible</title>
  <meta name="description" content="Tell us where you are. We'll meet you there. Join (Ad)mission Possible — free, built for the first in their family." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body data-page="join">

  <main class="interior">
    <div class="rule"></div>
    <div data-crumbs></div>
    <div class="rule rule--mb"></div>

    <div class="join__wrap">
      <form class="join__card" data-join-form novalidate>
        <div class="join__row3">
          <div class="field">
            <label for="first">First name</label>
            <input id="first" type="text" name="first" />
          </div>
          <div class="vrule"></div>
          <div class="field">
            <label for="last">Last name</label>
            <input id="last" type="text" name="last" />
          </div>
          <div class="vrule"></div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" name="email" />
          </div>
        </div>
        <div class="field field--mt">
          <label for="grade">Grade level</label>
          <input id="grade" type="text" name="grade" placeholder="e.g. 11th grade" />
        </div>
        <div class="field field--mt">
          <label for="needs">What do you need help with?</label>
          <textarea id="needs" name="needs" rows="3"></textarea>
        </div>
        <button type="submit" class="circle circle--join">Join</button>
      </form>
    </div>
    <div class="join__email">hello@admissionpossible.org</div>
  </main>

  <script src="./data.js"></script>
  <script src="./chrome.js" defer></script>
  <script src="./motion.js" defer></script>
  <script>
    (function () {
      var form = document.querySelector('[data-join-form]');
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var btn = form.querySelector('button[type="submit"]');
        form.reset();
        var prev = btn.textContent;
        btn.textContent = 'Thanks';
        setTimeout(function () { btn.textContent = prev; }, 1800);
      });
    })();
  </script>
</body>
</html>
